{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prarabdha Jyotish Kendra</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body,
        html,
        .bg-dark-theme {
            background-color: #0B0C10 !important;
            color: #E0E0E0 !important;
            font-family: 'Outfit', sans-serif;
        }

        /* === BRING CANVAS IN FRONT OF BACKGROUND, BEHIND CONTENT === */
        #bg-canvas {
            z-index: 0 !important;
        }

        #magic-cursor-canvas {
            z-index: 99999 !important;
        }

        .page-content,
        .premium-navbar,
        footer {
            position: relative;
            z-index: 10 !important;
        }

        .text-gold {
            color: #D4AF37 !important;
        }

        .btn-gold {
            background: #D4AF37 !important;
            color: #0B0C10 !important;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s ease;
        }

        .btn-gold:hover {
            background: #b5952f !important;
            color: white !important;
            transform: translateY(-2px);
        }

        .premium-navbar {
            background: rgba(20, 20, 25, 0.95) !important;
            border-bottom: 2px solid #D4AF37 !important;
        }

        .nav-link {
            color: #fff !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #D4AF37 !important;
        }

        /* === NEW FIX: RESTORE GLASS CARD BOXES GLOBALLY === */
        .glass-card {
            background: rgba(26, 36, 46, 0.7) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            color: white;
            transition: 0.4s ease;
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.5) !important;
            transform: translateY(-5px);
        }

        .card-icon {
            font-size: 3.5rem;
            color: #D4AF37;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* Footer Heart Animation */
        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.25);
            }
        }

        .pulse-heart {
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }
    </style>
</head>

<body class="bg-dark-theme">

    <nav class="navbar navbar-expand-lg premium-navbar px-4 fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand text-gold brand-font" href="/"
                style="font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.5rem;">
                Prarabdha Jyotish
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars text-gold"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto nav-links-custom">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat/">AstroGPT</a></li>
                    <li class="nav-item"><a class="nav-link" href="/kundali/">Kundali</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact Us</a></li>
                </ul>

                <div class="d-flex align-items-center">
                    <a href="/admin/" class="text-decoration-none">
                        <i class="fa-solid fa-circle-user fa-2x" style="color: #D4AF37;"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-content" style="padding-top: 100px;">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 mt-5 border-top"
        style="border-color: rgba(212, 175, 55, 0.2) !important; background: rgba(11, 12, 16, 0.9);">
        <p class="mb-0 text-white-50" style="font-size: 16px; letter-spacing: 1px;">
            © 2026 Copyright <br>
            Made with <i class="fa-solid fa-heart pulse-heart" style="color: #ff4d4d; margin: 0 5px;"></i> by <strong
                style="color: #D4AF37; font-weight: 700;">Orconix</strong>
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
