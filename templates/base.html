{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prarabdha Jyotish Kendra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #121212;
            --darker-bg: #1e1e1e;
            --gold: #D4AF37;
            --gold-hover: #F3E5AB;
            --text-light: #f8f9fa;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--darker-bg) !important;
            border-bottom: 2px solid var(--gold);
        }

        .navbar-brand,
        .nav-link {
            color: var(--gold) !important;
            font-weight: bold;
        }

        .nav-link:hover {
            color: var(--gold-hover) !important;
        }

        .btn-gold {
            background-color: var(--gold);
            color: var(--dark-bg);
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background-color: var(--gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(212, 175, 55, 0.4);
        }

        .card {
            background-color: var(--darker-bg);
            border: 1px solid rgba(236, 234, 226, 0.822);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(164, 241, 181, 0.863);
            border-color: var(--gold);
        }

        .form-control,
        .form-select {
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #2c2c2c;
            border-color: var(--gold);
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
            color: #fff;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        footer {
            margin-top: auto;
            background-color: var(--darker-bg);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            padding: 1rem 0;
            color: #aaa;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--gold);
        }

        .hero-logo {
            width: 300px;
            height: auto;
            object-fit: contain;
            display: block;
            margin: auto;
            filter: drop-shadow(0 0 25px rgba(212,175,55,.45));
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">ॐ प्रारब्ध ज्योतिष केंद्र</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'hastarekha' %}">Palm Reading</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'kundali' %}">Horoscope</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'check_report' %}">Check Report</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/">Admin Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container">
            <p class="mb-0">&copy; Devloped by Orconix 2026 Prarabdha Jyotish Kendra. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        {% block extra_js %} {% endblock %}
    </script>
</body>

</html>
